  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(180deg, #0d3F78 0%, #1064AD 50%, #DBEAFE 100%) fixed; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.12); padding: 8px 14px; border-radius: 8px; z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: linear-gradient(180deg, #0d3F78 0%, #1064AD 50%, #DBEAFE 100%); z-index: 9999; }
    #__bundler_thumbnail .splash-logo { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #E54800 0%, #FE8624 50%, #FFAB64 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(229,72,0,0.35); }
    #__bundler_thumbnail .splash-name { font: 700 18px/1 -apple-system, BlinkMacSystemFont, sans-serif; letter-spacing: -0.2px; color: #fff; }
    #__bundler_thumbnail .splash-spinner { width: 22px; height: 22px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: __splash_spin 0.7s linear infinite; }
    @keyframes __splash_spin { to { transform: rotate(360deg); } }
    #__bundler_placeholder { color: #999; font-size: 14px; }

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

click=\"{{ clearCreds }}\" class=\"tcg-btn-ghost\" style=\"height:44px; padding:0 20px; border:1px solid var(--border); border-radius:var(--radius-md); background:#fff; color:var(--neutral-b1); font-size:14px; font-weight:600; cursor:pointer;\">Clear<\u002Fbutton>\n          <button onclick=\"{{ saveCreds }}\" class=\"tcg-btn-primary\" style=\"{{ saveBtnStyle }}\">Save<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'generate', step: 4,\n    refs: 'EVAA-31997',\n    extracted: true, analyzing: false, hints: '', hintsHelpOpen: false,\n    reviewCount: 10, extractingUI: false, uiProgress: 100, uiStage: 3, uiDone: true,\n    files: [], generated: false, syncing: false,\n    step4Tab: 'existing', existingOpen: true, genOpen: true,\n    tcSearch: '', visibleCount: 20, selCase: 'CCI-12767',\n    updatedCases: {}, viewUpdated: false, updIds: '', updMsg: '',\n    secSummaryOpen: true, secPreOpen: true, secStepsOpen: true,\n    drSearch: '', selDraft: 'NEW-1', draftChecks: {}, deletedSteps: {},\n    titProject: '', suite: '', confUrl: '', genMsg: '', drMsg: '',\n    modalOpen: false, credsSaved: false, cUser:'', cToken:'', tToken:'',\n    serverCfg: null, serverCfgFailed: false,\n    checks: { confluence: { status:'idle' }, testit: { status:'idle' } },\n    resolved: {},\n    lastSyncedAt: null, tick: 0\n  };\n\n  TITLES = {\n    'EVAA-31997':'Supervisor Interactions view shows AI-handled interactions with transcript & scores',\n    'INIT-16664':'CX Supervisor observability initiative',\n    'ROE-13':'RingCX agent & supervisor experience',\n    'EUX-1390':'Display AI Agents & Digital Workers in CX Supervisor view'\n  };\n  titleFor(k){ return this.TITLES[k] || (k + ' — resolved from Jira'); }\n\n  componentDidMount(){\n    if (this.state.refs.trim()) this.resolveRefs(this.state.refs);\n    this._clock = setInterval(() => { if (this.state.lastSyncedAt) this.setState(st => ({ tick: st.tick + 1 })); }, 30000);\n    this.hydrateCreds();\n    this.fetchServerConfig();\n  }\n\n  STORAGE_KEY = 'tcg-service-creds';\n\n  hydrateCreds(){\n    try {\n      const raw = localStorage.getItem(this.STORAGE_KEY);\n      if (!raw) return;\n      const d = JSON.parse(raw) || {};\n      const restore = (c) => (c && c.status === 'ok') ? { status:'ok', account: c.account || '' } : { status:'idle' };\n      const checks = d.checks || {};\n      this.setState({\n        cUser: d.cUser || '', cToken: d.cToken || '', tToken: d.tToken || '',\n        credsSaved: !!(d.cUser || d.cToken || d.tToken),\n        checks: { confluence: restore(checks.confluence), testit: restore(checks.testit) }\n      });\n    } catch (e) {}\n  }\n\n  fetchServerConfig(){\n    fetch('/api/services/config')\n      .then(r => { if (!r.ok) throw new Error('bad status'); return r.json(); })\n      .then(cfg => this.setState({ serverCfg: cfg, serverCfgFailed: false }))\n      .catch(() => this.setState({ serverCfg: null, serverCfgFailed: true }));\n  }\n\n  setCheck(svc, patch){\n    this.setState(st => ({ checks: { ...st.checks, [svc]: patch } }));\n  }\n\n  testService(svc){\n    const s = this.state;\n    if (s.checks[svc].status === 'checking') return;\n    if (svc === 'confluence' && (!s.cUser.trim() || !s.cToken.trim())) {\n      this.setCheck(svc, { status:'fail', message:'Enter your Confluence username and API token.' });\n      return;\n    }\n    if (svc === 'testit' && !s.tToken.trim()) {\n      this.setCheck(svc, { status:'fail', message:'Enter your TestIT token.' });\n      return;\n    }\n    this.setCheck(svc, { status:'checking' });\n    const body = svc === 'confluence'\n      ? { service:'confluence', username: s.cUser.trim(), token: s.cToken }\n      : { service:'testit', token: s.tToken };\n    fetch('/api/services/test', {\n      method:'POST',\n      headers:{ 'Content-Type':'application/json' },\n      body: JSON.stringify(body)\n    })\n      .then(r => r.json())\n      .then(res => this.setCheck(svc, res.ok\n        ? { status:'ok', account: res.account || '' }\n        : { status:'fail', message: res.message || 'The check didn\\u2019t finish. Try again.' }))\n      .catch(() => this.setCheck(svc, { status:'fail', message:'Can\\u2019t reach the app server. Try again.' }));\n  }\n\n  setCred(key, svc){\n    return (e) => {\n      const v = e.target.value;\n      this.setState(st => ({ [key]: v, checks: { ...st.checks, [svc]: { status:'idle' } } }));\n      setTimeout(() => {\n        const st = this.state;\n        const ready = svc === 'confluence' ? (st.cUser.trim() && st.cToken.trim()) : !!st.tToken.trim();\n        if (ready) this.testService(svc);\n      }, 0);\n    };\n  }\n\n  persistCreds(){\n    const s = this.state;\n    const keep = (c) => c.status === 'ok' ? { status:'ok', account: c.account || '' } : undefined;\n    try {\n      localStorage.setItem(this.STORAGE_KEY, JSON.stringify({\n        cUser: s.cUser, cToken: s.cToken, tToken: s.tToken,\n        checks: { confluence: keep(s.checks.confluence), testit: keep(s.checks.testit) }\n      }));\n    } catch (e) {}\n  }\n\n  componentWillUnmount(){ if (this._clock) clearInterval(this._clock); }\n\n  relTime(ts){\n    if (!ts) return 'Not synced yet';\n    const d = Date.now() - ts;\n    if (d < 60000) return 'Just now';\n    const m = Math.floor(d / 60000);\n    if (m < 60) return m + (m === 1 ? ' min ago' : ' min ago');\n    const h = Math.floor(m / 60);\n    if (h < 24) return h + (h === 1 ? ' hr ago' : ' hrs ago');\n    return new Date(ts).toLocaleDateString();\n  }\n\n  resolveRefs(str){\n    const keys = [...new Set(this.parse(str).chips.map(c => c.value))];\n    this.setState(st => {\n      const resolved = { ...st.resolved };\n      keys.forEach(k => { if (!resolved[k]) resolved[k] = { loading:true, title:'' }; });\n      return { resolved };\n    });\n    this._pending = this._pending || {};\n    keys.forEach(k => {\n      if (this._pending[k] || (this.state.resolved[k] && this.state.resolved[k].title)) return;\n      this._pending[k] = setTimeout(() => {\n        delete this._pending[k];\n        this.setState(st => ({ resolved: { ...st.resolved, [k]: { loading:false, title:this.titleFor(k) } } }));\n      }, 550 + Math.random()*450);\n    });\n  }\n\n  KEYWORDS = ['login','SSO authentication','session timeout','MFA','password reset','invalid credentials','remember me','account lockout'];\n\n  EXAMPLE_HINTS = [\n    'UI BEHAVIORS',\n    '- Dropdown should remember last selected filter across sessions',\n    '- Disposition list should auto-close when clicking outside',\n    '',\n    'VALIDATION RULES',\n    '- Search field accepts a maximum of 100 characters',\n    '- Date range cannot end before it starts',\n    '',\n    'ERROR SCENARIOS',\n    '- Handle API timeout gracefully with a retry option',\n    '- Show a clear message when call history fails to load',\n    '',\n    'E2E FLOWS',\n    '- Sign in as agent, apply a filter, make a call, check history, verify the disposition saved',\n    '',\n    'EDGE CASES',\n    '- Special characters in disposition names (Chinese, Arabic, emoji)',\n    '- Agent with zero calls in the selected date range',\n    '',\n    'CROSS-SYSTEM VALIDATION',\n    '- Verify the API response matches the UI display',\n    '- Disposition saved in CRM matches the one shown in history',\n    '',\n    'LOCALIZATION',\n    '- Test with Spanish and Japanese locales',\n    '- Long translated labels should not truncate filters',\n    '',\n    'PERFORMANCE',\n    '- Page load time should stay under 2 seconds',\n    '- History list stays responsive with 10,000 records'\n  ].join('\\n');\n\n  DETECTED_SCREENS = ['Supervisor','Agent type','Agent','From','RingCentral, Inc.','Pending disposition','Interaction','Categories','Active interactions','Interactions rollup','Talk time','Pending disp.','State duration','RingCX Agent','Subject','Agents','Average time per call','Login','Interactions','State','Channel','Product','Longest active interaction'];\n  JIRA_SCREENS = [['Supervisor','0.90'],['Interactions','0.90'],['Agents','0.88'],['Interaction','0.82'],['Agent','0.72'],['Active interactions','0.70'],['State','0.68'],['Agent type','0.66']];\n\n  // ── Step 4 mock data ─────────────────────────────\n  segT(t){ return { t, st: { fontWeight: 400 } }; }\n  segB(t){ return { t, st: { fontWeight: 700 } }; }\n  segL(t){ return { t, st: { fontWeight: 700, color: 'var(--primary-f)', textDecoration: 'underline', cursor: 'pointer' } }; }\n  mkSegs(str){\n    const out = [];\n    String(str).split('**').forEach((part, i) => { if (part) out.push(i % 2 ? this.segB(part) : this.segT(part)); });\n    return out.length ? out : [this.segT('')];\n  }\n\n  EXISTING_CASES = [\n    { id:'CCI-12767', title:\"[Playwright][Automated. Do not change] Check ability to reorder columns for supervisor's agent view\", pr:1, score:'22.36', stepCount:5 },\n    { id:'CCI-31587', title:'[CCA E2E] Supervisor realtime stats telemetry for \"SUPERVISOR\" message during inbound call', pr:2, score:'21.38', stepCount:3 },\n    { id:'CCI-26440', title:'Supervisor Agent and Interactions view with saved table configuration', pr:3, score:'21.27', stepCount:6 },\n    { id:'CCI-10260', title:'[Playwright][Automated. Do not change] Check column values for agent supervisor list view (with omni enabled)', pr:4, score:'19.37', stepCount:6 },\n    { id:'CCI-31915', title:'Supervisor Agents table Hold duration column UI', pr:5, score:'18.91', stepCount:3 },\n    { id:'CCI-10713', title:'[Automated. Do not change] Check empty columns display a long dash when no value is present', pr:6, score:'18.05', stepCount:3 },\n    { id:'CCI-28104', title:'Supervisor can sort Agents table by State duration', pr:7, score:'17.82', stepCount:4 },\n    { id:'CCI-19477', title:'[CCA E2E] Interactions rollup counts match agent detail view', pr:8, score:'17.40', stepCount:5 },\n    { id:'CCI-22619', title:'Check Talk time column formatting for values over one hour', pr:9, score:'16.95', stepCount:3 },\n    { id:'CCI-30052', title:'Supervisor Interactions view keeps filters after tab switch', pr:10, score:'16.58', stepCount:4 },\n    { id:'CCI-11845', title:'[Playwright][Automated. Do not change] Verify Login column visibility toggle persists', pr:11, score:'16.11', stepCount:4 },\n    { id:'CCI-27390', title:'Check Utilisation column tooltip content and rounding', pr:12, score:'15.74', stepCount:3 },\n    { id:'CCI-14208', title:'Supervisor Agents table pagination with 500+ agents', pr:13, score:'15.32', stepCount:5 },\n    { id:'CCI-25888', title:'Check Average time per call column against reporting API', pr:14, score:'14.87', stepCount:4 },\n    { id:'CCI-31240', title:'[CCA E2E] Supervisor sees agent state change within 3 seconds', pr:15, score:'14.41', stepCount:6 },\n    { id:'CCI-16093', title:'Check Skill column shows all assigned skills in order', pr:16, score:'13.96', stepCount:3 },\n    { id:'CCI-29561', title:'Supervisor Interactions table column resize persists per user', pr:17, score:'13.52', stepCount:4 },\n    { id:'CCI-12034', title:'[Automated. Do not change] Check Pending Disposition badge count', pr:18, score:'13.08', stepCount:3 },\n    { id:'CCI-24717', title:'Supervisor can open agent detail from Agents table row', pr:19, score:'12.63', stepCount:4 },\n    { id:'CCI-18359', title:'Check Longest active Interaction column updates live', pr:20, score:'12.19', stepCount:5 },\n    { id:'CCI-20941', title:'Supervisor Agents table column order resets on Restore defaults', pr:21, score:'11.84', stepCount:4 },\n    { id:'CCI-15672', title:'[CCA E2E] Agent state telemetry during outbound call', pr:22, score:'11.47', stepCount:5 },\n    { id:'CCI-23508', title:'Check Interactions rollup column with zero interactions', pr:23, score:'11.09', stepCount:3 },\n    { id:'CCI-17226', title:'Supervisor view respects account-level column permissions', pr:24, score:'10.72', stepCount:4 },\n    { id:'CCI-26983', title:'Check State column color coding for all agent states', pr:25, score:'10.38', stepCount:3 },\n    { id:'CCI-13495', title:'[Playwright][Automated. Do not change] Agents table horizontal scroll with 13 columns', pr:26, score:'10.01', stepCount:4 },\n    { id:'CCI-21850', title:'Supervisor Interactions search matches partial subject text', pr:27, score:'9.67', stepCount:3 },\n    { id:'CCI-30714', title:'Check Agents table sticky header on scroll', pr:28, score:'9.28', stepCount:3 },\n    { id:'CCI-19082', title:'[CCA E2E] Supervisor tab access removed when permission revoked', pr:29, score:'8.94', stepCount:4 },\n    { id:'CCI-27541', title:'Check Agents table empty state when no agents match filters', pr:30, score:'8.55', stepCount:3 }\n  ];\n\n  caseDetail(c){\n    if (c.id === 'CCI-12767') {\n      return {\n        goal: 'Check settings table column for supervisor interaction list view.',\n        story: 'EVAA-2795', component: 'EAG',\n        pre: [\n          [this.segB('Account type(/s): '), this.segL('Unified Agent'), this.segT(' or '), this.segL('RC SSO Agent')],\n          this.mkSegs('with **\"Supervisor\"** Agent type ( see here ) **\" Allow Supervisee stats \"** is enabled in security settings'),\n          [this.segB('Extension type(/s):')],\n          [this.segB('Entry point(/s):')],\n          this.mkSegs('Log in to Agent as -> on **\"Supervisor\"** tab -> Agents')\n        ],\n        steps: [\n          { step:'Click on gear icon.', exp:'**\" Agent table settings\"** modal is opened. [L10N]' },\n          { step:'**Check checkbox** options order in the modal', exp:'The order should be: Agent(Disabled) | State | **State Duration** | State | Pending Disposition | Active Interactions | Longest active Interaction | Interactions rollup | Talk time | Average time per call | Login | Skill | Utilisation | [L10N]' },\n          { step:'Check **\"Agent\"** option is disabled and not Dragable', exp:'Agent option should be disabled and not dragable' },\n          { step:'Drag and Drop any values in the popup randomly and Click on save button', exp:'Popup should be Closed and the changed values should be displayed in the grid accordingly' },\n          { step:'Uncheck Login check box , Drag and drop to other place in popup', exp:'**Login Checkbox** should bot be displayed' }\n        ]\n      };\n    }\n    const genericSteps = [\n      { step:'Log in to Agent as a **\"Supervisor\"** user and open the Agents view.', exp:'The **Agents table** loads with the saved column configuration.' },\n      { step:'Locate the area described in the testcase title and interact with it.', exp:'The UI responds as described: **' + c.title.replace(/\\*\\*/g,'') + '**.' },\n      { step:'Refresh the page and check the same area again.', exp:'The behavior and configuration **persist** after reload. [L10N]' },\n      { step:'Verify the values against the reporting API response.', exp:'UI values **match** the API response for the same time range.' },\n      { step:'Repeat the check with a second supervisor account.', exp:'The behavior is **consistent** across supervisor accounts.' },\n      { step:'Check the audit log for the change event.', exp:'An audit entry is recorded with the correct user and timestamp.' }\n    ].slice(0, c.stepCount);\n    return {\n      goal: 'Check that ' + c.title.replace(/^\\[[^\\]]*\\]\\s*/g,'').replace(/\\.$/,'').toLowerCase() + ' works as specified.',\n      story: 'EVAA-2795', component: 'EAG',\n      pre: [\n        [this.segB('Account type(/s): '), this.segL('Unified Agent'), this.segT(' or '), this.segL('RC SSO Agent')],\n        this.mkSegs('with **\"Supervisor\"** Agent type and **\" Allow Supervisee stats \"** enabled in security settings'),\n        [this.segB('Extension type(/s):')],\n        [this.segB('Entry point(/s):')],\n        this.mkSegs('Log in to Agent as -> on **\"Supervisor\"** tab -> Agents')\n      ],\n      steps: genericSteps\n    };\n  }\n\n  DRAFTS = [\n    { id:'NEW-1', pr:'P2', title:'Supervisor Interactions view displays AI handled interactions with transcript and AI scores', stepCount:4,\n      goal:'Check that Supervisor Interactions view displays fully and partially AI-handled interactions and provides transcript, confidence score, and sentiment score for each AI-handled interaction.',\n      story:'EUX-1390', component:'EAG',\n      pre: [\n        ['**Account type(/s): **','__L:Unified Agent__'],\n        ['User **<ai_supervisor_user>** has Supervisor Agent type and permission to view Supervisor Interactions.'],\n        ['**AI Agent** observability is enabled for the account.'],\n        ['Prepared active interactions are available:'],\n        ['**<fully_ai_interaction>** is handled fully by **<ai_agent_name>** with Agent type AirPro.'],\n        ['**<partially_ai_interaction>** is handled partially by **<ai_agent_name>** with Agent type AirPro and then by **<human_agent_name>** with Agent type Human.'],\n        ['Transcript, confidence score, and sentiment score are generated for both AI-handled interactions.'],\n        ['**Extension type(/s):**'],\n        ['**Entry point(/s):**'],\n        ['Log in to **RingCX Agent** as **<ai_supervisor_user>** -> Supervisor -> Interactions']\n      ],\n      steps: [\n        { step:'Search for **<fully_ai_interaction>** in the Search interactions field.',\n          exp:['**The Interactions table** displays the matching interaction row.','**The row** contains expected values in the Channel, Categories, Product, Interaction, Agent, Agent type, From, Subject, and Pending disp. columns.','**The Agent** value is **<ai_agent_name>**.','**The Agent** type value is AirPro.'] },\n        { step:'Open the interaction detail for **<fully_ai_interaction>**.',\n          exp:['**The transcript** panel opens with the full conversation.','**Confidence score** and **sentiment score** are displayed for the interaction.'] },\n        { step:'Search for **<partially_ai_interaction>** and open its detail.',\n          exp:['**The row** shows both **<ai_agent_name>** and **<human_agent_name>** as handling agents.','**The transcript** marks the handoff point from AI to human.'] },\n        { step:'Clear the search field.',\n          exp:['**The Interactions table** returns to the unfiltered view.'] }\n      ] },\n    { id:'NEW-2', pr:'P2', title:'Supervisor can switch Digital Worker status off and on from Agents view', stepCount:5,\n      goal:'Check that a supervisor can toggle a Digital Worker\\u2019s status from the Agents view and the change is reflected in real time.',\n      story:'EUX-1390', component:'EAG',\n      pre: [\n        ['**Account type(/s): **','__L:Unified Agent__'],\n        ['User **<ai_supervisor_user>** has Supervisor Agent type and permission to manage Digital Workers.'],\n        ['At least one **Digital Worker** agent is provisioned and online.'],\n        ['**Entry point(/s):**'],\n        ['Log in to **RingCX Agent** as **<ai_supervisor_user>** -> Supervisor -> Agents']\n      ],\n      steps: [\n        { step:'Locate the **Digital Worker** row in the Agents table.', exp:['**The row** shows Agent type AirPro and current status Online.'] },\n        { step:'Open the row action menu and select **Turn off**.', exp:['A confirmation dialog appears describing the impact.'] },\n        { step:'Confirm the action.', exp:['**The status** changes to Offline within 3 seconds.','No new interactions are routed to the Digital Worker.'] },\n        { step:'Open the row action menu and select **Turn on**.', exp:['**The status** returns to Online within 3 seconds.'] },\n        { step:'Check the audit log.', exp:['Both status changes are recorded with **<ai_supervisor_user>** as the actor.'] }\n      ] },\n    { id:'NEW-3', pr:'P3', title:'Digital Worker observability data is exposed to Workflows', stepCount:4,\n      goal:'Check that Digital Worker observability metrics are available to Workflows for routing and reporting decisions.',\n      story:'EUX-1390', component:'EAG',\n      pre: [\n        ['**Account type(/s): **','__L:Unified Agent__'],\n        ['**AI Agent** observability is enabled for the account.'],\n        ['A workflow consuming **Digital Worker** metrics is published.'],\n        ['**Entry point(/s):**'],\n        ['Log in to **RingCX Agent** as **<ai_supervisor_user>** -> Workflows']\n      ],\n      steps: [\n        { step:'Open the published workflow and inspect the **Digital Worker** metrics node.', exp:['**The node** lists confidence score, sentiment score, and handled-interaction count as available inputs.'] },\n        { step:'Run the workflow with a test interaction.', exp:['**The run log** shows real metric values, not placeholders.'] },\n        { step:'Compare the metric values with the Supervisor Interactions view.', exp:['**The values match** for the same interaction and time range.'] },\n        { step:'Disable AI Agent observability and rerun the workflow.', exp:['**The run** fails with a clear error stating observability data is unavailable.'] }\n      ] }\n  ];\n\n  draftPreLines(dr){\n    return dr.pre.map(parts => {\n      const segs = [];\n      parts.forEach(p => {\n        if (p.indexOf('__L:') === 0) segs.push(this.segL(p.slice(4, -2)));\n        else this.mkSegs(p).forEach(sg => segs.push(sg));\n      });\n      return segs;\n    });\n  }\n\n  set(k){ return (e)=> this.setState({ [k]: e.target.value }); }\n\n  parse(str){\n    const toks=(str||'').split(/[\\s,]+/).map(t=>t.trim()).filter(Boolean);\n    let init='', epic='', story='';\n    const chips=[];\n    toks.forEach(t=>{\n      if(/^INIT-/i.test(t)){ init=t; chips.push({type:'Init', value:t, kind:'muted'}); }\n      else if(/^(ROE|EPIC)-/i.test(t)){ epic=t; chips.push({type:'Epic', value:t, kind:'muted'}); }\n      else { let v=t; const m=t.match(/([A-Za-z]{2,}-\\d+)/); if(m) v=m[1]; story=v; chips.push({type:'Story', value:v, kind:'story'}); }\n    });\n    return { init, epic, story, chips };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const stepDefs = [\n      { n:1, label:'Jira & requirements' },\n      { n:2, label:'Behavioral hints' },\n      { n:3, label:'UI context' },\n      { n:4, label:'Review / generate' },\n    ];\n    const steps = stepDefs.map((d, i) => {\n      const done = d.n < s.step, active = d.n === s.step;\n      const circleStyle = {\n        width:'26px', height:'26px', borderRadius:'50%', display:'flex', flex:'none',\n        alignItems:'center', justifyContent:'center', fontSize:'12px', fontWeight:700,\n        transition:'all .1618s cubic-bezier(0.382,0,0.786,1)', boxSizing:'border-box',\n        ...(active\n          ? { background:'var(--primary-b)', color:'#fff', boxShadow:'0 0 0 3px var(--primary-t20)' }\n          : done\n            ? { background:'var(--primary-b)', color:'#fff' }\n            : { background:'#fff', color:'var(--neutral-b3)', border:'1.5px solid var(--neutral-b4)' })\n      };\n      const labelStyle = {\n        fontSize:'13px', fontWeight: active?700:500, whiteSpace:'nowrap',\n        color: active ? 'var(--primary-f-high-contrast)' : done ? 'var(--neutral-b1)' : 'var(--neutral-b2)'\n      };\n      const prevDone = i > 0 && stepDefs[i-1].n < s.step;\n      const connectorStyle = {\n        flex:'1', height:'2px', minWidth:'24px', margin:'0 16px', borderRadius:'1px',\n        background: prevDone ? 'var(--primary-b)' : 'var(--neutral-b4)'\n      };\n      const cellStyle = i === 0\n        ? { display:'flex', alignItems:'center', flex:'none' }\n        : { display:'flex', alignItems:'center', flex:'1', minWidth:'0' };\n      const clickable = d.n <= s.step || s.extracted;\n      return {\n        ...d, done, active, showNum: !done, showConnector: i > 0,\n        cellStyle, circleStyle, labelStyle, connectorStyle, cursor: clickable ? 'pointer' : 'default',\n        onClick: () => { if (clickable) this.setState({ step:d.n }); }\n      };\n    });\n\n    const titleMap = {1:'Jira information & requirements',2:'Behavioral hints & test scenarios',3:'UI context',4:'Review Existing / Generate New'};\n    const descMap = {\n      1:'Enter Jira references — we\\u2019ll fetch each ticket, then analyze the story for keywords.',\n      2:'Add optional UI behaviors, edge cases, E2E flows, or validation notes to guide missing test case coverage.',\n      3:'Upload Figma screenshots, extract UI context, find matching TestIT cases, and prioritize the results.',\n      4:'Select a testcase from the list, review the current version, and update only the cases that need changes.'\n    };\n\n    const tab = (id, label) => ({\n      label,\n      onClick: () => this.setState({ tab:id }),\n      activeClass: s.tab===id ? 'tcg-tab-active' : '',\n      color: s.tab===id ? 'var(--primary-f-high-contrast)' : 'var(--neutral-b2)'\n    });\n\n    const badge = (color, bg) => ({ fontSize:'12px', fontWeight:600, padding:'4px 12px', borderRadius:'9999px', color, background:bg, whiteSpace:'nowrap' });\n    const svcRow = { display:'inline-flex', alignItems:'center', gap:'8px', fontSize:'13px', fontWeight:600, color:'var(--neutral-b1)', padding:'7px 13px', border:'1px solid var(--border)', borderRadius:'9999px', background:'#fff' };\n    const pillOk = { status:'Connected', badgeStyle: badge('var(--success-f)','var(--success-t10)'), dot:'var(--success)' };\n    const pillOff = { status:'Not configured', badgeStyle: badge('var(--warning-f)','rgba(255,102,0,.1)'), dot:'var(--warning)' };\n    const pillFail = { status:'Not connected', badgeStyle: badge('var(--danger-f)','var(--danger-t10)'), dot:'var(--danger)' };\n    const pillChecking = { status:'Checking\\u2026', badgeStyle: badge('var(--neutral-b2)','var(--neutral-b5)'), dot:'var(--neutral-b4)' };\n    const cfg = s.serverCfg;\n    const serverPill = (svc) => cfg\n      ? ((cfg[svc] || {}).configured ? pillOk : pillOff)\n      : (s.serverCfgFailed ? pillOff : p <script>
  (function () {
    function update() {
      var el = document.getElementById('tcg-actbar');
      if (!el) return;
      var r = el.getBoundingClientRect();
      var vh = window.innerHeight || document.documentElement.clientHeight;
      var stuck = r.bottom >= vh - 3 && r.top < vh - 3;
      el.classList.toggle('is-stuck', stuck);
    }
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    setInterval(update, 200);
